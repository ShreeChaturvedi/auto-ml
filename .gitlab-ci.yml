image: node:22-slim

variables:
  NODE_OPTIONS: --max-old-space-size=4096
  VERCEL_CLI_VERSION: "51.2.1"

stages:
  - install
  - check
  - build
  - test
  - deploy

.run_on_branch_or_mr:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

install:
  extends: .run_on_branch_or_mr
  stage: install
  script:
    - npm run install:all
  cache:
    key:
      files:
        - backend/package-lock.json
        - frontend/package-lock.json
    paths:
      - backend/node_modules/
      - frontend/node_modules/
      - testing/node_modules/
      - video/node_modules/
    policy: pull-push

lint:
  extends: .run_on_branch_or_mr
  stage: check
  script:
    - npm run lint
  cache:
    key:
      files:
        - backend/package-lock.json
        - frontend/package-lock.json
    paths:
      - backend/node_modules/
      - frontend/node_modules/
      - video/node_modules/
    policy: pull

build:
  extends: .run_on_branch_or_mr
  stage: build
  script:
    - npm run build
  cache:
    key:
      files:
        - backend/package-lock.json
        - frontend/package-lock.json
    paths:
      - backend/node_modules/
      - frontend/node_modules/
    policy: pull

test:
  extends: .run_on_branch_or_mr
  stage: test
  script:
    - npm run test
  cache:
    key:
      files:
        - backend/package-lock.json
        - frontend/package-lock.json
    paths:
      - backend/node_modules/
      - frontend/node_modules/
    policy: pull

landing:build:
  extends: .run_on_branch_or_mr
  stage: build
  script:
    - npm --prefix landing run typecheck
    - npm --prefix landing run build
    - npm --prefix landing run test
    - npm --prefix landing run lint
  cache:
    key:
      files:
        - backend/package-lock.json
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
      - landing/node_modules/
    policy: pull
  artifacts:
    paths:
      - landing/dist/
    expire_in: 1 week

landing:vercel:preview:
  stage: deploy
  allow_failure: true
  script:
    - npx --yes vercel@"$VERCEL_CLI_VERSION" pull --yes --environment=preview --git-branch="$CI_COMMIT_REF_NAME" --token="$VERCEL_TOKEN"
    - npx --yes vercel@"$VERCEL_CLI_VERSION" build --yes --target=preview --token="$VERCEL_TOKEN"
    - npx --yes vercel@"$VERCEL_CLI_VERSION" deploy --prebuilt --yes --target=preview --token="$VERCEL_TOKEN" -m gitlabDeployment="1" -m gitlabCommitRef="$CI_COMMIT_REF_NAME" -m gitlabCommitSha="$CI_COMMIT_SHA"
  rules:
    - if: '$VERCEL_TOKEN && $VERCEL_ORG_ID && $VERCEL_PROJECT_ID && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      changes:
        - .gitlab-ci.yml
        - package.json
        - package-lock.json
        - vercel.json
        - scripts/patch-csp-deps.mjs
        - landing/**/*
        - frontend/src/**/*

landing:vercel:production:
  stage: deploy
  script:
    - npx --yes vercel@"$VERCEL_CLI_VERSION" pull --yes --environment=production --token="$VERCEL_TOKEN"
    - npx --yes vercel@"$VERCEL_CLI_VERSION" build --yes --target=production --token="$VERCEL_TOKEN"
    - npx --yes vercel@"$VERCEL_CLI_VERSION" deploy --prebuilt --yes --target=production --token="$VERCEL_TOKEN" -m gitlabDeployment="1" -m gitlabCommitRef="$CI_COMMIT_REF_NAME" -m gitlabCommitSha="$CI_COMMIT_SHA"
  rules:
    - if: '$VERCEL_TOKEN && $VERCEL_ORG_ID && $VERCEL_PROJECT_ID && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - .gitlab-ci.yml
        - package.json
        - package-lock.json
        - vercel.json
        - scripts/patch-csp-deps.mjs
        - landing/**/*
        - frontend/src/**/*
