image: node:22-slim

stages:
  - install
  - check
  - build
  - test

install:
  stage: install
  script:
    - npm run install:all
  cache:
    key:
      files:
        - backend/package-lock.json
        - frontend/package-lock.json
    paths:
      - backend/node_modules/
      - frontend/node_modules/
      - testing/node_modules/
    policy: pull-push

lint:
  stage: check
  script:
    - npm run lint
  cache:
    key:
      files:
        - backend/package-lock.json
        - frontend/package-lock.json
    paths:
      - backend/node_modules/
      - frontend/node_modules/
    policy: pull

build:
  stage: build
  variables:
    NODE_OPTIONS: --max-old-space-size=4096
  script:
    - npm run build
  cache:
    key:
      files:
        - backend/package-lock.json
        - frontend/package-lock.json
    paths:
      - backend/node_modules/
      - frontend/node_modules/
    policy: pull

test:
  stage: test
  variables:
    NODE_OPTIONS: --max-old-space-size=4096
  script:
    - npm run test
  cache:
    key:
      files:
        - backend/package-lock.json
        - frontend/package-lock.json
    paths:
      - backend/node_modules/
      - frontend/node_modules/
    policy: pull

landing:build:
  stage: build
  script:
    - npm --prefix landing ci
    - npm --prefix landing run build
    - npm --prefix landing run test
    - npm --prefix landing run lint
  cache:
    key:
      files:
        - landing/package-lock.json
    paths:
      - landing/node_modules/
    policy: pull-push
  artifacts:
    paths:
      - landing/dist/
    expire_in: 1 week
