<script>
document.addEventListener("DOMContentLoaded", () => {
    const svgs = document.querySelectorAll('.box svg');
    const svg = svgs[0];
    if (!svg) return;

    const $ = (suffix) => svg.querySelector('#ms-' + CSS.escape(suffix));
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const s = 79.2;
    const h = 84;
    const cx = 180;
    const cy = 160;
    const vs = 0.5;
    const p = 7.9;

    const V = [
      [-s, 0, -s],
      [s, 0, -s],
      [s, 0, s],
      [-s, 0, s],
      [-s, h, -s],
      [s, h, -s],
      [s, h, s],
      [-s, h, s],
    ];

    const GL = [
      [[-s, 0, -s / 2], [s, 0, -s / 2]],
      [[-s, 0, 0], [s, 0, 0]],
      [[-s, 0, s / 2], [s, 0, s / 2]],
      [[-s / 2, 0, -s], [-s / 2, 0, s]],
      [[0, 0, -s], [0, 0, s]],
      [[s / 2, 0, -s], [s / 2, 0, s]],
    ];

    const WI = [
      [0, 1, 5, 4],
      [1, 2, 6, 5],
      [2, 3, 7, 6],
      [3, 0, 4, 7],
    ];

    const WN = [
      [0, 0, -1],
      [1, 0, 0],
      [0, 0, 1],
      [-1, 0, 0],
    ];

    const ND = [
      { x: -s, z: 0, h: 28 },
      { x: s, z: 0, h: 42 },
      { x: -s / 2, z: s, h: 21 },
      { x: s / 2, z: -s, h: 42 },
    ];
    const NL = ['a', 'b', 'c', 'd'];

    const PB = [
      [-p, 11, -p],
      [p, 11, -p],
      [p, 11, p],
      [-p, 11, p],
    ];

    function R(x, y, z, a) {
      const c = Math.cos(a);
      const sn = Math.sin(a);
      return [x * c - z * sn, y, x * sn + z * c];
    }

    function P(q, a) {
      const r = R(q[0], q[1], q[2], a);
      return [cx + r[0], cy + r[2] * vs - r[1]];
    }

    function pts(arr, a) {
      let o = '';
      for (let i = 0; i < arr.length; i++) {
        if (i) o += ' ';
        const q = P(arr[i], a);
        o += q[0].toFixed(1) + ',' + q[1].toFixed(1);
      }
      return o;
    }

    function sL(el, a3, b3, ang) {
      const p1 = P(a3, ang);
      const p2 = P(b3, ang);
      el.setAttribute('x1', p1[0].toFixed(1));
      el.setAttribute('y1', p1[1].toFixed(1));
      el.setAttribute('x2', p2[0].toFixed(1));
      el.setAttribute('y2', p2[1].toFixed(1));
    }

    function sC(el, q, a) {
      const r = P(q, a);
      el.setAttribute('cx', r[0].toFixed(1));
      el.setAttribute('cy', r[1].toFixed(1));
    }

    const spd = (Math.PI * 2) / 25000;
    let raf = 0;

    function frame(t) {
      const a = Math.PI / 4 + t * spd;

      const floor = $('floor');
      if (floor) floor.setAttribute('points', pts([V[0], V[1], V[2], V[3]], a));

      for (let i = 0; i < 6; i++) {
        const line = $('gl' + i);
        if (line) sL(line, GL[i][0], GL[i][1], a);
      }

      for (let i = 0; i < 4; i++) {
        const el = $('w' + i);
        if (!el) continue;
        const w = WI[i];
        el.setAttribute('points', pts([V[w[0]], V[w[1]], V[w[2]], V[w[3]]], a));
        const n = WN[i];
        const zc = n[0] * Math.sin(a) + n[2] * Math.cos(a);
        if (zc > 0) {
          el.setAttribute('fill', 'rgba(255,255,255,0.04)');
          el.setAttribute('stroke', 'rgba(255,255,255,0.10)');
        } else {
          el.setAttribute('fill', 'rgba(255,255,255,0.07)');
          el.setAttribute('stroke', 'rgba(255,255,255,0.16)');
        }
        el.setAttribute('stroke-width', '1');
      }

      for (let i = 0; i < 4; i++) {
        const pil = $('pil' + i);
        if (pil) sL(pil, V[i], V[i + 4], a);
      }

      const sy = 20 + 6 * Math.sin(t / 1200);
      const scan = $('scan');
      if (scan) scan.setAttribute('points', pts([[-s, sy, -s], [s, sy, -s], [s, sy, s], [-s, sy, s]], a));

      for (let i = 0; i < 4; i++) {
        const n = ND[i];
        const l = NL[i];
        const nh = n.h + 3 * Math.sin(t / 800 + i * 1.5);
        const line = $('nl' + l);
        const circ = $('nd' + l);
        if (line) sL(line, [n.x, 0, n.z], [n.x, nh, n.z], a);
        if (circ) sC(circ, [n.x, nh, n.z], a);
      }

      const po = 5 * Math.sin(t / 1000);
      const pb = [];
      for (let i = 0; i < 4; i++) pb.push([PB[i][0], PB[i][1] + po, PB[i][2]]);
      const pa = [0, 45 + po, 0];

      const pyrBase = $('pyr-base');
      if (pyrBase) pyrBase.setAttribute('points', pts(pb, a));

      const pyrShadow = $('pyr-shadow');
      if (pyrShadow) {
        pyrShadow.setAttribute(
          'points',
          pts(
            [
              [pb[0][0], pb[0][1] - 4, pb[0][2]],
              [pb[1][0], pb[1][1] - 4, pb[1][2]],
              [pb[2][0], pb[2][1] - 4, pb[2][2]],
              [pb[3][0], pb[3][1] - 4, pb[3][2]],
            ],
            a
          )
        );
      }

      for (let i = 0; i < 4; i++) {
        const j = (i + 1) % 4;
        const el = $('pyrf' + i);
        if (!el) continue;
        el.setAttribute('points', pts([pb[i], pb[j], pa], a));
        const fn = WN[i];
        const fz = fn[0] * Math.sin(a) + fn[2] * Math.cos(a);
        if (fz > 0) {
          el.setAttribute('fill', 'rgba(255,255,255,0.18)');
          el.setAttribute('stroke', 'rgba(255,255,255,0.35)');
        } else {
          el.setAttribute('fill', 'rgba(255,255,255,0.42)');
          el.setAttribute('stroke', 'rgba(255,255,255,0.58)');
        }
        el.setAttribute('stroke-width', '0.75');
      }

      const beam = $('beam');
      if (beam) sL(beam, [0, pa[1], 0], [0, 119 + po, 0], a);
      const bkDot = $('bk-dot');
      if (bkDot) sC(bkDot, [0, 119 + po, 0], a);
      const bkRing = $('bk-ring');
      if (bkRing) sC(bkRing, [0, 119 + po, 0], a);

      const rcy = cy - (11 + po);
      const ringI = $('ring-i');
      if (ringI) ringI.setAttribute('cy', rcy.toFixed(1));
      const ringO = $('ring-o');
      if (ringO) ringO.setAttribute('cy', rcy.toFixed(1));

      const edgeTop = $('edge-top');
      if (edgeTop) edgeTop.setAttribute('points', pts([V[4], V[5], V[6], V[7], V[4]], a));
    }

    function loop(t) {
      frame(t);
      if (!reduced) raf = requestAnimationFrame(loop);
    }

    if (reduced) {
      frame(typeof performance !== 'undefined' ? performance.now() : 0);
    } else {
      raf = requestAnimationFrame(loop);
    }
});
</script>
