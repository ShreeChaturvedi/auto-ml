<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 80" width="100%" height="80" fill="none">
  <defs>
    <pattern id="ruler" width="100" height="80" patternUnits="userSpaceOnUse">
      <g stroke="#808080" stroke-opacity="0.3" stroke-width="1">
        <line x1="0" y1="40" x2="100" y2="40" />
        <line x1="0" y1="30" x2="0" y2="50" />
        <line x1="10" y1="36" x2="10" y2="44" />
        <line x1="20" y1="36" x2="20" y2="44" />
        <line x1="30" y1="36" x2="30" y2="44" />
        <line x1="40" y1="36" x2="40" y2="44" />
        <line x1="50" y1="33" x2="50" y2="47" />
        <line x1="60" y1="36" x2="60" y2="44" />
        <line x1="70" y1="36" x2="70" y2="44" />
        <line x1="80" y1="36" x2="80" y2="44" />
        <line x1="90" y1="36" x2="90" y2="44" />
      </g>
    </pattern>
  </defs>
  <rect width="1440" height="80" fill="url(#ruler)" />
</svg>