<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255, 255, 255, 0.4)" />
    </marker>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="0.5" />
    </pattern>
  </defs>

  <rect width="360" height="240" fill="url(#grid)" />

  <g transform="translate(30, 30)">
    <!-- Meta-orchestration bounding box -->
    <path d="M -10 -10 L 310 -10 L 310 190 L -10 190 Z" fill="rgba(255, 255, 255, 0.01)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    <rect x="-11" y="-11" width="3" height="3" fill="rgba(255, 255, 255, 0.3)" />
    <rect x="308" y="-11" width="3" height="3" fill="rgba(255, 255, 255, 0.3)" />
    <rect x="-11" y="188" width="3" height="3" fill="rgba(255, 255, 255, 0.3)" />
    <rect x="308" y="188" width="3" height="3" fill="rgba(255, 255, 255, 0.3)" />

    <!-- Lane 1 -->
    <rect x="0" y="10" width="300" height="36" rx="2" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    <text x="8" y="22" fill="rgba(255, 255, 255, 0.4)" font-family="monospace" font-size="7" letter-spacing="1">LANE 1: CONTEXT</text>
    
    <!-- Timing ticks -->
    <path d="M 60 10 v 36 M 120 10 v 36 M 180 10 v 36 M 240 10 v 36" stroke="rgba(255, 255, 255, 0.04)" stroke-width="0.5" stroke-dasharray="2 2" />

    <!-- Tokens Lane 1 -->
    <rect x="40" y="26" width="30" height="12" rx="1.5" fill="rgba(255, 255, 255, 0.1)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="0.5" />
    <rect x="76" y="26" width="40" height="12" rx="1.5" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="0.5" />
    <rect x="122" y="26" width="20" height="12" rx="1.5" fill="rgba(255, 255, 255, 0.1)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="0.5" />

    <!-- Lane 2 -->
    <rect x="0" y="70" width="300" height="36" rx="2" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    <text x="8" y="82" fill="rgba(255, 255, 255, 0.4)" font-family="monospace" font-size="7" letter-spacing="1">LANE 2: REASONING</text>
    
    <!-- Timing ticks -->
    <path d="M 60 70 v 36 M 120 70 v 36 M 180 70 v 36 M 240 70 v 36" stroke="rgba(255, 255, 255, 0.04)" stroke-width="0.5" stroke-dasharray="2 2" />

    <!-- Tokens Lane 2 -->
    <rect x="110" y="86" width="60" height="12" rx="1.5" fill="rgba(255, 255, 255, 0.12)" stroke="rgba(255, 255, 255, 0.25)" stroke-width="0.5" />
    <rect x="176" y="86" width="30" height="12" rx="1.5" fill="rgba(255, 255, 255, 0.18)" stroke="rgba(255, 255, 255, 0.35)" stroke-width="0.5" />

    <!-- Lane 3 -->
    <rect x="0" y="130" width="300" height="46" rx="2" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1" />
    <text x="8" y="142" fill="rgba(255, 255, 255, 0.5)" font-family="monospace" font-size="7" letter-spacing="1">LANE 3: EXECUTION (META)</text>
    
    <!-- Timing ticks -->
    <path d="M 60 130 v 46 M 120 130 v 46 M 180 130 v 46 M 240 130 v 46" stroke="rgba(255, 255, 255, 0.04)" stroke-width="0.5" stroke-dasharray="2 2" />

    <!-- Tokens Lane 3 -->
    <rect x="160" y="150" width="80" height="16" rx="2" fill="rgba(255, 255, 255, 0.2)" stroke="rgba(255, 255, 255, 0.4)" stroke-width="0.5" />
    <!-- Nested tokens indicating meta-orchestration -->
    <rect x="164" y="154" width="20" height="8" rx="1" fill="rgba(255, 255, 255, 0.15)" />
    <rect x="188" y="154" width="26" height="8" rx="1" fill="rgba(255, 255, 255, 0.3)" />
    <rect x="218" y="154" width="18" height="8" rx="1" fill="rgba(255, 255, 255, 0.5)" />

    <!-- Vertical / Cross-lane Connections -->
    <!-- Lane 1 to Lane 2 -->
    <path d="M 96 38 v 20 c 0 4 4 4 4 4 h 6 c 4 0 4 4 4 4 v 20" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" marker-end="url(#arrow)" />
    <path d="M 132 38 v 24 c 0 4 -4 4 -4 4 h -14 c -4 0 -4 4 -4 4 v 16" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1" stroke-dasharray="2 2" marker-end="url(#arrow)" />

    <!-- Lane 2 to Lane 3 -->
    <path d="M 140 98 v 24 c 0 4 4 4 4 4 h 12 c 4 0 4 4 4 4 v 20" fill="none" stroke="rgba(255, 255, 255, 0.25)" stroke-width="1" marker-end="url(#arrow)" />
    <path d="M 191 98 v 24 c 0 4 4 4 4 4 h 6 c 4 0 4 4 4 4 v 20" fill="none" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1" marker-end="url(#arrow)" />

    <!-- Direct Lane 1 to Lane 3 (bypassing) -->
    <path d="M 55 38 v 76 c 0 4 4 4 4 4 h 97 c 4 0 4 4 4 4 v 28" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="0.75" stroke-dasharray="1 3" marker-end="url(#arrow)" />

    <!-- Final Output Connection -->
    <path d="M 240 158 h 46" fill="none" stroke="rgba(255, 255, 255, 0.35)" stroke-width="1" marker-end="url(#arrow)" />
    <circle cx="286" cy="158" r="2" fill="rgba(255, 255, 255, 0.8)" />

    <!-- Node connection dots -->
    <circle cx="96" cy="38" r="1.5" fill="rgba(255, 255, 255, 0.6)" />
    <circle cx="132" cy="38" r="1.5" fill="rgba(255, 255, 255, 0.6)" />
    <circle cx="55" cy="38" r="1.5" fill="rgba(255, 255, 255, 0.6)" />
    <circle cx="140" cy="98" r="1.5" fill="rgba(255, 255, 255, 0.6)" />
    <circle cx="191" cy="98" r="1.5" fill="rgba(255, 255, 255, 0.6)" />

  </g>
</svg>