<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" fill="none">
  <defs>
    <style>
      .mo-dash {
        stroke-dasharray: 4 4;
        animation: mo-dash-anim 2s linear infinite;
      }
      @keyframes mo-dash-anim {
        0% { stroke-dashoffset: 8; }
        100% { stroke-dashoffset: 0; }
      }
      .mo-token {
        animation: mo-float 4s ease-in-out infinite alternate;
      }
      .mo-token-fast {
        animation: mo-float 3s ease-in-out infinite alternate-reverse;
      }
      @keyframes mo-float {
        0% { transform: translateY(0px); }
        100% { transform: translateY(-4px); }
      }
      .mo-glow-path {
        stroke-dasharray: 40 100;
        stroke-dashoffset: 40;
        animation: shoot 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        filter: drop-shadow(0px 0px 3px rgba(255,255,255,0.8));
      }
      @keyframes shoot {
        0% { stroke-dashoffset: 40; opacity: 0; }
        10% { opacity: 1; }
        90% { stroke-dashoffset: -100; opacity: 1; }
        100% { stroke-dashoffset: -100; opacity: 0; }
      }
      .mo-pulse {
        animation: pulse 2s ease-in-out infinite alternate;
      }
      @keyframes pulse {
        0% { opacity: 0.3; }
        100% { opacity: 0.8; }
      }
    </style>
  </defs>
