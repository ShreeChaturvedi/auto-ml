<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" width="360" height="240" fill="none">
  <defs>
    <radialGradient id="fade" cx="180" cy="150" r="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="gridMask">
      <rect x="0" y="0" width="360" height="240" fill="url(#fade)"/>
      <polygon points="180,110 260,150 180,190 100,150" fill="#000"/>
    </mask>
    <pattern id="gridPattern" width="14.142" height="14.142" patternUnits="userSpaceOnUse">
      <path d="M 14.142 0 L 0 0 0 14.142" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="0.75" fill="rgba(255,255,255,0.3)"/>
    </pattern>
  </defs>

  <!-- Background / Outer Grid -->
  <g mask="url(#gridMask)">
    <g transform="translate(180, 150) scale(1, 0.5) rotate(45)">
      <rect x="-282.84" y="-282.84" width="565.68" height="565.68" fill="url(#gridPattern)"/>
    </g>
  </g>

  <!-- THE BOUNDED WORKSPACE -->
  
  <!-- Back Pillars -->
  <line x1="180" y1="110" x2="180" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="100" y1="150" x2="100" y2="90" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="260" y1="150" x2="260" y2="90" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Back-Left Wall -->
  <polygon points="180,110 100,150 100,90 180,50" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Back-Right Wall -->
  <polygon points="180,110 260,150 260,90 180,50" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- Box Floor -->
  <polygon points="180,110 260,150 180,190 100,150" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  
  <!-- Inner Floor Grid -->
  <g stroke="rgba(255,255,255,0.12)" stroke-width="0.5">
    <line x1="160" y1="120" x2="240" y2="160"/>
    <line x1="140" y1="130" x2="220" y2="170"/>
    <line x1="120" y1="140" x2="200" y2="180"/>
    
    <line x1="200" y1="120" x2="120" y2="160"/>
    <line x1="220" y1="130" x2="140" y2="170"/>
    <line x1="240" y1="140" x2="160" y2="180"/>
  </g>

  <!-- Mid-air scanning plane -->
  <polygon points="180,90 260,130 180,170 100,130" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5" stroke-dasharray="2 2"/>

  <!-- Floating Data Nodes -->
  <g stroke="rgba(255,255,255,0.4)" stroke-width="0.75">
    <line x1="140" y1="130" x2="140" y2="110"/>
    <circle cx="140" cy="110" r="1.5" fill="rgba(255,255,255,0.8)" stroke="none"/>

    <line x1="220" y1="170" x2="220" y2="140"/>
    <circle cx="220" cy="140" r="1.5" fill="rgba(255,255,255,0.8)" stroke="none"/>

    <line x1="120" y1="160" x2="120" y2="145"/>
    <circle cx="120" cy="145" r="1.5" fill="rgba(255,255,255,0.8)" stroke="none"/>

    <line x1="240" y1="140" x2="240" y2="110"/>
    <circle cx="240" cy="110" r="1.5" fill="rgba(255,255,255,0.8)" stroke="none"/>
  </g>

  <!-- Central Figure: Floating Pyramid & Energy Rings -->
  <ellipse cx="180" cy="142" rx="28" ry="14" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.5" stroke-dasharray="1 3"/>
  <ellipse cx="180" cy="142" rx="38" ry="19" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  
  <!-- Base shadow -->
  <polygon points="180,143 188,147 180,151 172,147" fill="rgba(255,255,255,0.1)" stroke="none"/>

  <!-- Pyramid Base -->
  <polygon points="180,138 188,142 180,146 172,142" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.6)" stroke-width="0.5"/>
  <!-- Pyramid Left Face -->
  <polygon points="172,142 180,146 180,118" fill="rgba(255,255,255,0.7)" stroke="rgba(255,255,255,0.9)" stroke-width="0.75"/>
  <!-- Pyramid Right Face -->
  <polygon points="180,146 188,142 180,118" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.7)" stroke-width="0.75"/>

  <!-- Upward Energy Beam -->
  <line x1="180" y1="118" x2="180" y2="65" stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-dasharray="2 3"/>
  <circle cx="180" cy="65" r="2" fill="rgba(255,255,255,0.9)"/>
  <circle cx="180" cy="65" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>

  <!-- Front Walls (Glass) -->
  <polygon points="100,150 180,190 180,130 100,90" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <polygon points="180,190 260,150 260,90 180,130" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Bounded Workspace Highlights -->
  <polyline points="100,90 180,130 260,90" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.25"/>
  <line x1="180" y1="130" x2="180" y2="190" stroke="rgba(255,255,255,0.6)" stroke-width="1.25"/>
  
  <!-- Subtle UI/Tech details on the walls -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="0.5">
    <line x1="110" y1="145" x2="110" y2="140"/>
    <line x1="120" y1="150" x2="120" y2="140"/>
    <line x1="130" y1="155" x2="130" y2="145"/>
    <line x1="250" y1="145" x2="250" y2="140"/>
    <line x1="240" y1="150" x2="240" y2="140"/>
    <line x1="230" y1="155" x2="230" y2="145"/>
  </g>

  <!-- Frame/Corner Brackets -->
  <path d="M 20 20 L 30 20 M 20 20 L 20 30" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <path d="M 340 20 L 330 20 M 340 20 L 340 30" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <path d="M 20 220 L 30 220 M 20 220 L 20 210" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <path d="M 340 220 L 330 220 M 340 220 L 340 210" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  
  <text x="25" y="38" fill="rgba(255,255,255,0.2)" font-family="monospace" font-size="5" letter-spacing="1">ENV: SANDBOX</text>
  <text x="335" y="215" fill="rgba(255,255,255,0.2)" font-family="monospace" font-size="5" letter-spacing="1" text-anchor="end">SYS.READY</text>
</svg>